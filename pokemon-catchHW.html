<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c2c69;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;

            /* 濃縮成一行：圖片網址 / 置中 / 滿版 / 不重複 */
            background: url('https://pbs.twimg.com/media/G_PSvwkboAAVm1T?format=jpg&name=medium') center / cover no-repeat;
        }

        .container {
            background: #ffffff54;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px #0000001a;
            text-align: center;
            width: 350px;
        }

        .search-box input {
            padding: 8px;
            width: 70%;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .search-box button {
            padding: 8px 12px;
            background-color: #ffcb05;
            color: #3b4cca;
            border: none;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        .card {
            margin-top: 20px;
            padding: 15px;
            border: 2px solid #3b4cca;
            border-radius: 8px;
            background-color: #fffde770;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .card img {
            width: 150px;
            height: 150px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>catchPokémon!</h1>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="輸入寶可夢名稱或編號（例如: pikachu 或 25）">
            <button id="searchBtn">Catch</button>
        </div>
        <!-- 結果 -->
        <div id="pokemonCard" class="card">
            <p>search your pokemon</p>
        </div>

    </div>

    <script>
        // 綁定 HTML 元素
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const pokemonCard = document.getElementById('pokemonCard');
        // 監聽按鈕點擊事件
        searchBtn.addEventListener('click', () => {
            const keyword = searchInput.value.trim().toLowerCase(); // 轉小寫以符合 API 規範
            if (keyword) { getPokemonData(keyword); }
        });

        // 核心功能：非同步取得寶可夢資料
        async function getPokemonData(nameOrId) {
            // 預設顯示載入中
            pokemonCard.innerHTML = `<p>Loading...</p>`;
            try {
                // API
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${nameOrId}`);
                // 找不到
                if (!response.ok) { throw new Error('MISS Pokémon QQ Try again!'); }
                const data = await response.json();

                // 解析 API 資料結構
                const name = data.name.toUpperCase();
                const id = data.id;
                // 確保圖片路徑
                const imageUrl = data.sprites.front_default || data.sprites.other['official-artwork'].front_default;
                // 串接屬性
                const types = data.types.map(t => t.type.name).join(', ');
                // 將名稱、圖片、屬性顯示在網頁上
                pokemonCard.innerHTML = `
                    <h2>#${id} ${name}</h2>
                    <img src="${imageUrl}" alt="${name}" />
                    <p><strong>屬性:</strong> ${types}</p>
                `;
            } catch (error) {
                // 錯誤處理
                console.error(error);
                pokemonCard.innerHTML = `<p style="color: red;">(  ߹꒳​߹ ): ${error.message}</p>`;
            }
        }
        // 預設載入超能妙喵₍ᵔ ˲  ̫ ˱ ᵔ₎
        getPokemonData('MEOWSTIC-FEMALE');
    </script>
</body>

</html>
