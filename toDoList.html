<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900|Noto+Sans+TC:400,500,700"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="./css/index.css">
    <!-- 使用CSS框架/前端框架 -> 寫在原本目前的那個頁面上 -->
</head>

<body>
    <div class="wrap">
        <div class="hero center">
            <div class="title-wrap">
                <h3 class="hero-title"><a href="#">My ToDoList</a></h3>
            </div>
            <div class="add-new-task">
                <div class="tag-row">
                    <span class="tag">private</span>
                    <span class="tag">work</span>
                    <span class="tag">family</span>
                    <span class="tag">study</span>
                </div>
                <input type="text" class="task-input" placeholder="add a task...">
                <i class="fas fa-plus-square add"></i>
            </div>
            <p class="info"></p>
        </div>

        <div class="list-area-wrap">
            <div class="list-area center">
                <div class="select">
                    <i class="fas fa-tag"></i>
                    <div id="task-type">
                        <span class="chosen">all</span>
                        <ul class="type-selector hide">
                            <li class="option">all</li>
                        </ul>
                    </div>
                </div>
                <ul class="todolist"></ul>
                <div class="remove"><a href="#" class="delete-all">Remove All</a></div>
            </div>
        </div>
    </div>

    <script>
        const addTaskBtn = document.querySelector('.add');
        const myList = document.querySelector('.todolist');
        const tagList = document.querySelector('.tag-row');
        const typeList = document.getElementById('task-type');
        const taskList = JSON.parse(localStorage.getItem('task')) || [];
        // 文字列からJavaScriptの配列オブジェクトへと復元

        let currentTag = localStorage.usedTag || 'private';
        let selectFilter = 'all';

        // LocalStorageを更新し、画面を再描画する
        const saveAndRender = () => {
            localStorage.setItem('task', JSON.stringify(taskList));
            // ▲ 配列オブジェクトから文字列へと変換
            localStorage.usedTag = currentTag;
            printList();
        };

        // フィルター用のドロップダウンメニューを初期化
        document.querySelectorAll('.tag').forEach(el => {
            const typeLi = document.createElement('li');
            typeLi.className = 'option';
            typeLi.textContent = el.textContent;
            document.querySelector('.type-selector').appendChild(typeLi);
        });

        // 画面のレンダリング（描画）
        const printList = () => {
            // 1. カテゴリに基づいてデータをフィルタリング
            const filteredTasks = taskList.filter(item => selectFilter === 'all' || item.tag === selectFilter);

            // HTML文字列を生成してレンダリング（テンプレートリテラル：バッククォート ` を使用）
            myList.innerHTML = filteredTasks.length ? filteredTasks.map((item, index) => `
        <li class="${item.done ? 'done-check' : ''}" data-num="${taskList.indexOf(item)}">
            <div class="list-task">
                <i class="fas fa-check-circle done"></i>
                <span class="list-tag ${item.tag}">${item.tag}</span>
                <span class="task-name">${item.task}</span>
            </div>
            <div>
                <i class="fas fa-pen modify" style="padding: 0.8rem;"></i>
                <i class="fas fa-trash delete" style="padding: 0.8rem;"></i>
            </div>
        </li>
    `).join('') : `<p style="color: #aaa; margin: 0 0 1.5rem 0;">No task here...</p>`;

            // 「すべて削除（Remove All）」ボタンの表示制御
            document.querySelector('.delete-all').style.display = filteredTasks.length > 1 ? 'inline-block' : 'none';
        };

        // タグの切り替え（新規タスク追加用のタグ選択状態）
        const initTag = () => {
            document.querySelectorAll('.tag').forEach(el => {
                el.classList.toggle('tag-select', el.textContent === currentTag);
            });
        };

        tagList.addEventListener('click', (e) => {
            if (e.target.nodeName !== 'SPAN') return;
            currentTag = e.target.textContent;
            initTag();
            localStorage.usedTag = currentTag;
        });

        // 新規タスクの追加
        const addNewTask = () => {
            const taskInput = document.querySelector('.task-input');
            if (!taskInput.value.trim()) return;

            taskList.push({ task: taskInput.value, tag: currentTag, done: false });
            taskInput.value = '';
            saveAndRender();
        };

        // リスト内のクリック処理（完了、編集、削除）
        myList.addEventListener('click', (e) => {
            const targetLi = e.target.closest('li');
            // チェックマーク、テキスト、外枠のどこをクリックしても、.closest('li') が自動的に最も近い親要素の <li> を探してくれます。
            // その後、targetLi.dataset.num を取得することで、ユーザーがどの配列インデックス（index）のタスクを操作しているかを特定できます。
            if (!targetLi) return;
            const index = targetLi.dataset.num;
            const taskSpan = targetLi.querySelector('.task-name');

            // 削除
            if (e.target.classList.contains('delete')) {
                targetLi.classList.add('delete-animation');
                setTimeout(() => { taskList.splice(index, 1); saveAndRender(); }, 600);
            }
            // 編集 (contentEditable を利用して、クリックでテキストを直接編集可能にする)
            else if (e.target.classList.contains('modify')) {
                if (targetLi.classList.contains('done-check')) return;
                taskSpan.contentEditable = true;
                taskSpan.focus();
                taskSpan.onblur = () => {
                    taskSpan.contentEditable = false;
                    taskList[index].task = taskSpan.textContent;
                    saveAndRender();
                };
            }
            // 完了状態の切り替え
            else {
                if (taskSpan.getAttribute('contenteditable') !== 'true') {
                    taskList[index].done = !taskList[index].done;
                    saveAndRender();
                }
            }
        });

        // 現在選択されているカテゴリの全タスクを削除
        document.querySelector('.delete-all').addEventListener('click', (e) => {
            e.preventDefault();
            for (let i = taskList.length - 1; i >= 0; i--) {
                if (selectFilter === 'all' || taskList[i].tag === selectFilter) taskList.splice(i, 1);
            }
            // ▲ インデックス 0 のデータを削除すると、インデックス 1 のデータが 0 に繰り上がります。しかし、通常のループだと次は 1 をチェックするため、繰り上がったデータがスキップされてしまいます。そのため、後ろから前に向かって削除していくことで、未チェックのデータインデックスに影響を与えずに処理できます！
            saveAndRender();
        });

        // フィルターメニューの制御
        document.querySelector('#task-type').addEventListener('click', (e) => {
            e.stopPropagation();
            document.querySelector('.type-selector').classList.toggle('hide');
            if (e.target.classList.contains('option')) {
                document.querySelector('.chosen').textContent = selectFilter = e.target.textContent;
                printList();
            }
        });

        document.body.addEventListener('click', () => document.querySelector('.type-selector').classList.add('hide'), true);
        document.body.addEventListener('keydown', (e) => { if (e.key === 'Enter' && e.target.classList.contains('task-input')) addNewTask(); });
        addTaskBtn.addEventListener('click', addNewTask);
        // 初期化処理
        initTag();
        printList();
    </script>
    <!-- 1.新增的按鈕沒有反應 -->
    <!-- 2.Enter事件綁定錯誤 -->
    <!-- 3.下拉選單點擊後要收合起來 -->
    <!-- 4.完成清單打勾時要有刪除線的功能沒反應 -->
    <!-- 5.編輯時會需要有一個確認的按鈕 -->
</body>

</html>
