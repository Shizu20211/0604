    <script>
        // 同步的範例

        // 非同步的範例
        console.log('先執行1');
        // setTimeout(()=>{要執行的事情}, 毫秒);
        // 1秒 -> 1000毫秒
        setTimeout(() => {
            console.log('先執行2');
        }, 2000);
        console.log('先執行3');
        // https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=CWA-CEECA653-673F-4B84-8DB6-86D7B1E5D463

        // async 宣告方法要使用非同步功能
        async function getweather() {
            // await 等待這個完成後才會執行下面的內容
            // await 使用方式，只要是會需要一點時間才拿得到的就要使用
            const a = await fetch('https://opendata.cwa.gov.tw/api/v1/rest/datastore/F-C0032-001?Authorization=CWA-CEECA653-673F-4B84-8DB6-86D7B1E5D463');
            const b = a.json();
            console.log(b);
            // const res = await fetch(apiUrl);
            // const data = await res.json();
        }

        getweather();

        // 同步的寫法
        // fetch()
        //     .then(回傳)
        //     .then(要執行的事情)

    </script>
