<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO-LIST</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900|Noto+Sans+TC:400,500,700"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        html {
            -webkit-box-sizing: border-box;
            box-sizing: border-box;
            font-size: 62.5%;
            /* 字型大小16px，乘62.5% = 10px。
            之後 1.8rem 就能直接換算18px，
            在最下方的 @media 媒體查詢中，只需要改 html 的字體大小，
            整個網頁的元件就會等比例縮放 */
        }

        *,
        *::after,
        *::before {
            -webkit-box-sizing: inherit;
            box-sizing: inherit;
            margin: 0;
            padding: 0;
            outline: 0;
        }

        body {
            font-family: 'Lato', 'Noto Sans TC', 'sans-serif';
            font-weight: 400;
            font-size: 2.2rem;
            line-height: 1.7;
            color: #414141;
            background: #9cd6d1;
            overflow-x: hidden;
        }

        input {
            font-family: 'Lato', 'Noto Sans TC', 'sans-serif';
            border: none;
            color: #414141;
            font-size: 1.8rem;
            line-height: 3rem;
        }

        ul {
            list-style: none;
        }

        a {
            text-decoration: none;
            color: #414141;
        }

        .task-input {
            line-height: 3rem;
            border-bottom: 2px solid #414141;
            font-size: 2rem;
            max-width: 40rem;
            width: 80%;
            padding: 0.3rem 1.5rem;
            background: transparent;
            font-weight: 700;
            letter-spacing: 0.1rem;
            color: #313131;
        }

        .task-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .modify-input {
            background: rgba(255, 255, 255, 0.4);
            color: #666;
            width: 30rem;
        }

        .add {
            font-size: 3rem;
            line-height: 3rem;
            vertical-align: middle;
            margin-left: 1rem;
            color: #313131;
            text-shadow: 0px 1px 5px rgba(0, 0, 0, 0.4);
        }

        .delete,
        .modify {
            text-shadow: 0px 1px 5px rgba(0, 0, 0, 0.4);
        }

        i:hover {
            cursor: pointer;
        }

        i:active {
            transform: translate(1px, 1px);
        }

        .done {
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0px 1px 5px rgba(0, 0, 0, 0.4);
            transition: 0.4s color;
            margin-right: 2rem;
        }

        .done-check .done {
            color: #515151;
        }

        .done-check {
            background: none !important;
        }

        .done-check .list-task,
        .done-check .modify {
            opacity: 0.3;
        }

        /* 完成任務時的刪除線效果 */
        .done-check .task-name {
            text-decoration: line-through;
            color: #777;
        }

        .todolist li:hover>div>.done {
            color: #515151;
        }

        .wrap {
            width: 100vw;
            min-height: calc(100vh - 22.5rem);
            margin: 3rem 0;
        }

        .center {
            width: 50vw;
            max-width: 700px;
            margin: 0 auto;
        }

        .hero {
            margin-top: 5rem;
            text-align: center;
            font-weight: 700;
        }

        .hero-title {
            margin-bottom: 4rem;
            background: #f0d7b6;
            clip-path: polygon(0 50%, 7% 0, 100% 0, 100% 100%, 7% 100%, 0 50%);
            /* ▲ 剪裁路徑 */
            position: relative;
            border-top-right-radius: 10px;
            border-bottom-right-radius: 10px;
            overflow: hidden;
        }

        .title-wrap {
            filter: drop-shadow(0px 3px 5px #666);
        }

        .hero-title::before {
            content: '';
            width: 2rem;
            height: 2rem;
            background: #414141;
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%);
            z-index: 2;
        }

        .hero-title::after {
            content: '';
            height: 100%;
            width: 5.5rem;
            background: #daa592;
            position: absolute;
            right: 0;
        }

        .hero-title a {
            font-size: 3rem;
            font-weight: 700;
            color: #313131;
            letter-spacing: 4px;
            text-shadow: 0px 2px 4px rgba(88, 79, 79, 0.5);
            text-decoration: none;
            transition: 0.3s color;
        }

        .hero-title a:hover {
            color: rgb(201, 97, 101);
        }

        .tag {
            font-size: 1.6rem;
            padding: 0.2rem 1.3rem;
            border-radius: 50rem;
            background: rgba(232, 239, 181, 0.7);
            color: #555;
            display: inline-block;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.51);
        }

        .tag:hover {
            cursor: pointer;
        }

        .tag:active {
            transform: translate(0.5px, 0.5px);
            box-shadow: 0.5px 0.5px 5px rgba(0, 0, 0, 0.51);
        }

        .tag-select {
            background: #fabc74;
            color: #414141;
        }

        .tag-row {
            margin-bottom: 2rem;
        }

        .tag-row span~span {
            margin-left: 0.5rem;
        }

        .info {
            height: 3.5rem;
            margin-top: 1.5rem;
            color: #fabc74;
            letter-spacing: 2px;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .list-area {
            margin-top: 1.5rem;
            background: #fff;
            padding: 1rem 3rem 2.5rem 3rem;
            position: relative;
            clip-path: polygon(0% 0%, calc(100% - 3rem) 0%, 100% 3rem, 150% 150%, -50% 150%);
        }

        .list-area-wrap {
            filter: drop-shadow(0px 3px 5px rgba(50, 50, 0, 0.5));
        }

        .list-area::after {
            content: '';
            width: 3rem;
            height: 3rem;
            background: #99c4c1;
            position: absolute;
            right: 0;
            top: 0;
            clip-path: polygon(0 0, 0% 0, 0% 100%, 100% 100%);
        }

        .remove {
            text-align: center;
        }

        .delete-all {
            display: none;
            background: #414141;
            color: #fff;
            padding: 0.2rem 1.2rem;
            border-radius: 50rem;
            font-size: 1.3rem;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 1px 1px 5px rgba(0, 0, 0, 0.51);
            margin-top: 2rem;
        }

        .delete-all:hover {
            box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.51);
            transform: translate(-0.8px, -0.8px);
        }

        .todolist {
            margin-top: 1.5rem;
            transition: 1s all;
        }

        .todolist li {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.8rem;
        }

        .todolist li+li {
            margin-top: 0.8rem;
        }

        .todolist li:nth-child(odd) {
            background: rgba(250, 188, 116, 0.6);
        }

        .todolist li:nth-child(even) {
            background: #eee;
        }

        .todolist li:hover {
            cursor: pointer;
        }

        .list-task {
            width: 80%;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            padding-left: 5px;
        }

        .delete-animation {
            animation: deleting 1s;
        }

        @keyframes deleting {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            80% {
                transform: scale(0.1);
                opacity: 0;
            }

            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        .list-tag {
            display: inline-block;
            width: 7.5rem;
            font-size: 1.4rem;
            text-align: center;
            padding: 0.2rem 0;
            border-radius: 50rem;
            background: #fff;
            margin-right: 3rem;
            transform: translateY(-2px);
            box-shadow: 0px 1px 5px rgba(0, 0, 0, 0.5);
        }

        .private {
            background: #89a3b2;
            color: #fff;
        }

        .work {
            background: #b2d3be;
        }

        .family {
            background: #f2f4d1;
        }

        .learning {
            background: #f3826f;
            color: #fff;
        }

        .select {
            display: inline-block;
            margin: 1rem 0;
            position: relative;
        }

        #task-type {
            width: 100px;
            cursor: pointer;
            position: absolute;
            top: 2px;
            left: 40px;
            z-index: 1;
        }

        .chosen {
            display: block;
            font-size: 1.4rem;
            padding: 0.6rem 3rem 0.6rem 1.4rem;
            text-align: center;
            border-radius: 50rem;
            background: #f5f4e8;
            z-index: 99;
        }

        .type-selector {
            max-height: 200px;
            transition: 0.2s;
            overflow: hidden;
            border-radius: 5px;
        }

        .type-selector.hide {
            visibility: hidden;
            max-height: 0px;
        }

        .type-selector .option {
            font-size: 1.4rem;
            padding: 0.6rem 3rem 0.6rem 1.4rem;
            text-align: center;
            background: #f5f4e8;
        }

        .type-selector .option:hover {
            background: #dddabd;
        }

        .footer {
            font-size: 1.5rem;
            text-align: center;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.4);
            letter-spacing: 1px;
            margin-bottom: 1.5rem;
            margin-top: 10rem;
            height: 5rem;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .footer span {
            font-size: 1.4rem;
        }

        .footer i {
            margin: 0 1rem;
            color: rgb(173, 79, 79);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.17);
        }

        @media only screen and (max-width: 1024px) {
            html {
                font-size: 50%;
            }
        }

        @media only screen and (max-width: 768px) {
            .center {
                width: 70vw;
            }
        }

        @media only screen and (max-width: 480px) {
            html {
                font-size: 35%;
            }

            .center {
                width: 80vw;
            }

            .list-task {
                margin-top: 1rem;
            }

            .list-tag {
                display: block;
                margin-bottom: 0.5rem;
            }

            .hero-title {
                clip-path: polygon(0 50%, 10% 0, 100% 0, 100% 100%, 10% 100%, 0 50%);
            }

            .hero-title::before {
                width: 2rem;
                height: 2rem;
                top: 50%;
                left: 0;
                transform: translateY(-50%);
            }

            .hero-title::after {
                width: 4rem;
                background: #daa592;
                position: absolute;
                right: 0;
            }
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="hero center">
            <div class="title-wrap">
                <h3 class="hero-title"><a href="#">My ToDoList</a></h3>
            </div>
            <div class="add-new-task">
                <div class="tag-row">
                    <span class="tag">private</span>
                    <span class="tag">work</span>
                    <span class="tag">family</span>
                    <span class="tag">study</span>
                </div>
                <input type="text" class="task-input" placeholder="add a task...">
                <i class="fas fa-plus-square add"></i>
            </div>
            <p class="info"></p>
        </div>

        <div class="list-area-wrap">
            <div class="list-area center">
                <div class="select">
                    <i class="fas fa-tag"></i>
                    <div id="task-type">
                        <span class="chosen">all</span>
                        <ul class="type-selector hide">
                            <li class="option">all</li>
                        </ul>
                    </div>
                </div>
                <ul class="todolist"></ul>
                <div class="remove"><a href="#" class="delete-all">Remove All</a></div>
            </div>
        </div>
    </div>

    <script>
        const addTaskBtn = document.querySelector('.add');
        const myList = document.querySelector('.todolist');
        const tagList = document.querySelector('.tag-row');
        const typeList = document.getElementById('task-type');
        const taskList = JSON.parse(localStorage.getItem('task')) || [];
        //字串還原 JavaScript 的陣列

        let currentTag = localStorage.usedTag || 'private';
        let selectFilter = 'all';

        // 更新 LocalStorage 並重新渲染畫面
        const saveAndRender = () => {
            localStorage.setItem('task', JSON.stringify(taskList));
            // ▲ 陣列物件轉字串
            localStorage.usedTag = currentTag;
            printList();
        };

        // 初始化篩選下拉選單
        document.querySelectorAll('.tag').forEach(el => {
            const typeLi = document.createElement('li');
            typeLi.className = 'option';
            typeLi.textContent = el.textContent;
            document.querySelector('.type-selector').appendChild(typeLi);
        });

        // 渲染畫面
        const printList = () => {
            // 1. 根據分類篩選資料
            const filteredTasks = taskList.filter(item => selectFilter === 'all' || item.tag === selectFilter);

            // 產出 HTML 字串並渲染 樣版字串:反引號 `
            myList.innerHTML = filteredTasks.length ? filteredTasks.map((item, index) => `
        <li class="${item.done ? 'done-check' : ''}" data-num="${taskList.indexOf(item)}">
            <div class="list-task">
                <i class="fas fa-check-circle done"></i>
                <span class="list-tag ${item.tag}">${item.tag}</span>
                <span class="task-name">${item.task}</span>
            </div>
            <div>
                <i class="fas fa-pen modify" style="padding: 0.8rem;"></i>
                <i class="fas fa-trash delete" style="padding: 0.8rem;"></i>
            </div>
        </li>
    `).join('') : `<p style="color: #aaa; margin: 0 0 1.5rem 0;">No task here...</p>`;

            // 控制「刪除全部」按鈕顯示
            document.querySelector('.delete-all').style.display = filteredTasks.length > 1 ? 'inline-block' : 'none';
        };
        // 標籤切換（新增任務用的標籤）
        const initTag = () => {
            document.querySelectorAll('.tag').forEach(el => {
                el.classList.toggle('tag-select', el.textContent === currentTag);
            });
        };
        tagList.addEventListener('click', (e) => {
            if (e.target.nodeName !== 'SPAN') return;
            currentTag = e.target.textContent;
            initTag();
            localStorage.usedTag = currentTag;
        });
        // 新增任務
        const addNewTask = () => {
            const taskInput = document.querySelector('.task-input');
            if (!taskInput.value.trim()) return;

            taskList.push({ task: taskInput.value, tag: currentTag, done: false });
            taskInput.value = '';
            saveAndRender();
        };
        // 處理清單點擊（完成、修改、刪除）
        myList.addEventListener('click', (e) => {
            const targetLi = e.target.closest('li');
            //不論點到的是勾勾、文字還是外框，.closest('li') 都會自動向上尋找最近的 <li> 祖先元素。
            // 接著透過 targetLi.dataset.num 就能知道使用者到底是在操作哪一個陣列索引（index）的任務。
            if (!targetLi) return;
            const index = targetLi.dataset.num;
            const taskSpan = targetLi.querySelector('.task-name');

            // 刪除
            if (e.target.classList.contains('delete')) {
                targetLi.classList.add('delete-animation');
                setTimeout(() => { taskList.splice(index, 1); saveAndRender(); }, 600);
            }
            // 修改 (利用 contentEditable 點擊直接改文字)
            else if (e.target.classList.contains('modify')) {
                if (targetLi.classList.contains('done-check')) return;
                taskSpan.contentEditable = true;
                taskSpan.focus();
                taskSpan.onblur = () => {
                    taskSpan.contentEditable = false;
                    taskList[index].task = taskSpan.textContent;
                    saveAndRender();
                };
            }
            // 切換完成狀態
            else if (!taskSpan.contentEditable || taskSpan.contentEditable === 'false') {
                taskList[index].done = !taskList[index].done;
                saveAndRender();
            }
        });

        // 刪除目前分類的所有任務
        document.querySelector('.delete-all').addEventListener('click', (e) => {
            e.preventDefault();
            for (let i = taskList.length - 1; i >= 0; i--) {
                if (selectFilter === 'all' || taskList[i].tag === selectFilter) taskList.splice(i, 1);
            }
            // ▲ 刪除了索引 0 的資料，故索引 1 的資料會往前遞補變成 0，但迴圈接下來會去檢查 1，會導致被遞補的那筆資料被漏掉，所以從後往前刪除就不會影響前面尚未檢查的資料索引！
            saveAndRender();
        });

        // 篩選選單控制
        document.querySelector('#task-type').addEventListener('click', (e) => {
            e.stopPropagation();
            document.querySelector('.type-selector').classList.toggle('hide');
            if (e.target.classList.contains('option')) {
                document.querySelector('.chosen').textContent = selectFilter = e.target.textContent;
                printList();
            }
        });

        document.body.addEventListener('click', () => document.querySelector('.type-selector').classList.add('hide'), true);
        document.body.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.target.classList.contains('task-input')) addNewTask(); });

        // 初始化
        initTag();
        printList();
    </script>

</body>

</html>
